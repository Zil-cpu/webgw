<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support Ticket</title>
<link rel="icon" href="logo Elshinta.png">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>


<style>
body{
    font-family: 'Segoe UI';
    margin:0;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    background:#2a5298;
    color:white;
    cursor:pointer;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

.status-open{color:red;}
.status-done{color:green;}
</style>

</head>

<body>

<div class="container">

<div style="text-align:right;">
<div id="clock" style="text-align:right; font-weight:bold; margin-bottom:10px;"></div>
<button onclick="adminLogin()">Login Admin</button>

</div>

<h2>IT Support Ticket</h2>

<form onsubmit="createTicket(event)">
<input id="nama" placeholder="Nama Pelapor" required>
<select id="departemen" required>
<option value="">Pilih Dept</option>
<option>IT</option>
<option>Redaksi</option>
<option>Listener</option>
<option>Medsos</option>
<option>Website</option>
<option>Hrd</option>
<option>GA</option>
<option>Marketing</option>
<option>Finance</option>
<option>Admin</option>
<option>Koordinator Daerah</option>
    

</select>
<textarea id="deskripsi" placeholder="Masalah" required></textarea>
<input type="file" id="foto" accept="image/*">
<textarea id="penyelesaian" placeholder="Solusi"></textarea>

<button type="submit">Buat Tiket</button>
</form>

<h3>Daftar Tiket</h3>

<table>
<thead>
<tr>
<th>No Antrian</th>
<th>Nama</th>
<th>Dept</th>
<th>Deskripsi</th>
<th>Waktu</th>
<th>Foto</th>
<th>Solusi</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>

</div>

<script>

// CONFIG (GANTI API KEY LU)
const firebaseConfig = {
  apiKey: "ISI_API_KEY_LO",
  authDomain: "it-supportticket.firebaseapp.com",
  databaseURL: "https://it-supportticket-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "it-supportticket"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let isAdmin = false;

// LOAD DATA
function loadTickets(){
    console.log("LOAD TICKETS JALAN");
    const table = document.getElementById("ticketTable");

    db.ref("tickets").on("value", snap=>{
        console.log("DATA MASUK:", snap.val());

        table.innerHTML="";
        let no=1;

        snap.forEach(child=>{
            const t = child.val();
            const key = child.key;

            const row = table.insertRow();

            row.innerHTML = `
            <td>ANTRIAN-${String(no++).padStart(3,'0')}</td>
            <td>${t.nama}</td>
            <td>${t.departemen}</td>
            <td>${t.deskripsi}</td>
            <td>${t.waktu || '-'}</td>
            <td>${t.foto ? `<img src="${t.foto}" width="80" onclick="window.open('${t.foto}')">` : ''}</td>
            <td>${t.penyelesaian || '-'}</td>
            <td class="${t.status==='OPEN'?'status-open':'status-done'}">${t.status}</td>
            <td>
            ${isAdmin ? `
            <button onclick="done('${key}')">✔</button>
            <button onclick="editTicket('${key}')">✏️</button>
            <button onclick="hapus('${key}')">🗑</button>
            ` : '-'}
            </td>
            `;
        });
    });
}

// CREATE
function createTicket(e){
    e.preventDefault();

    const nama = document.getElementById("nama").value;
    const departemen = document.getElementById("departemen").value;
    const deskripsi = document.getElementById("deskripsi").value;
    const penyelesaian = document.getElementById("penyelesaian").value;
    const file = document.getElementById("foto").files[0];
    const now = new Date();

    if(file){
        const reader = new FileReader();

        reader.onload = function(){
            const now = new Date();
            
            const data = {
                nama,
                departemen,
                deskripsi,
                foto: reader.result,
                penyelesaian,
                status: penyelesaian ? "DONE" : "OPEN",
                createdAt: Date.now(),
                waktu: now.toLocaleString("id-ID")
       };

            console.log("Kirim data:", data);
            simpanData(data);
        }

        reader.readAsDataURL(file); // WAJIB ADA
    }else{
        const now = new Date();
        
        const data = {
            nama,
            departemen,
            deskripsi,
            foto: "",
            penyelesaian,
            status: penyelesaian ? "DONE" : "OPEN",
            createdAt: Date.now(),
            waktu: now.toLocaleString("id-ID")
        };

        console.log("Kirim data:", data);
        simpanData(data);
    }
}


// SIMPAN DATA
function simpanData(data){
    db.ref("tickets").push(data)
    .then(()=>{
        alert("✅ BERHASIL MASUK FIREBASE");
        document.querySelector("form").reset();
    })
    .catch(err=>{
        console.error("ERROR:", err);
        alert("❌ GAGAL");
    });
}

// UPDATE
function done(key){
    const solusi = prompt("Isi solusi:");
    if(!solusi) return;

    db.ref("tickets/"+key).update({
        penyelesaian: solusi,
        status: "DONE"
    });
}

// DELETE
function hapus(key){
    if(confirm("Hapus tiket?")){
        db.ref("tickets/"+key).remove();
    }
}

// EDIT
function editTicket(key){
    db.ref("tickets/"+key).once("value", snap=>{
        const t = snap.val();

        const nama = prompt("Edit Nama:", t.nama);
        if(nama===null) return;

        const departemen = prompt("Edit Departemen:", t.departemen);
        if(departemen===null) return;

        const deskripsi = prompt("Edit Deskripsi:", t.deskripsi);
        if(deskripsi===null) return;

        const penyelesaian = prompt("Edit Solusi:", t.penyelesaian || "");
        if(penyelesaian===null) return;

        db.ref("tickets/"+key).update({
            nama: nama,
            departemen: departemen,
            deskripsi: deskripsi,
            foto: "",
            penyelesaian: penyelesaian,
            status: penyelesaian ? "DONE" : "OPEN"
        });
    });
}

// ADMIN LOGIN
function adminLogin(){
    const pass = prompt("Password:");
    if(pass==="admin123"){
        isAdmin=true;
        alert("Admin login");
        loadTickets();//
    }else{
        alert("Salah");
    }
}

// jalan tiap detik
function updateClock(){
    const now = new Date();
    const waktu = now.toLocaleString("id-ID");
    document.getElementById("clock").innerHTML = waktu;
}

setInterval(updateClock, 1000);
 
// INIT
window.onload = function(){
    console.log("Web siap");
    loadTickets();
    updateClock(); 
};
  
// realtime log
db.ref("tickets").on("value", snap=>{
    console.log("DATA:", snap.val());  
});
    
console.log("JS jalan");
</script>

</body>
</html>
