<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support Ticket</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2a5298;
}

form{
    display:grid;
    gap:15px;
}

input, select, textarea{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2a5298;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#2a5298;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.status-open{color:red;font-weight:bold;}
.status-done{color:green;font-weight:bold;}

.dark-mode{
    background:#121212 !important;
    color:white !important;
}

.dark-mode .container{
    background:#1e1e1e;
}

@media (max-width:768px){
    .container{margin:10px;padding:20px;}
    table{display:block;overflow-x:auto;}
}
</style>

</head>

<body>

<div class="container">

<div style="text-align:right;">
<button onclick="adminLogin()">Login Admin</button>
</div>

<div id="clock" style="text-align:right;font-weight:bold;"></div>

<h1>IT Support Ticket System</h1>

<form onsubmit="createTicket(event)">
    <input type="text" id="nama" placeholder="Nama Pelapor" required>

    <select id="departemen" required>
        <option value="">-- Pilih Departemen --</option>
        <option>IT</option>
        <option>Redaksi</option>
        <option>Listener</option>
        <option>Medsos</option>
    </select>

    <textarea id="deskripsi" placeholder="Deskripsi Kendala" required></textarea>

    <textarea id="penyelesaian" placeholder="Penyelesaian (IT)"></textarea>

    <button type="submit">Buat Tiket</button>
</form>

<hr>

<h2>Daftar Tiket</h2>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Dept</th>
<th>Deskripsi</th>
<th>Penyelesaian</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>

</div>

<script>
<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "ISI_API_KEY_LO",
  authDomain: "it-supportticket.firebaseapp.com",
  databaseURL: "https://it-supportticket-default-rtdb.firebaseio.com/",
  projectId: "it-supportticket"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin = false;

// LOAD DATA
function loadTickets(){
    const table = document.getElementById("ticketTable");

    db.ref("tickets").on("value", snapshot => {
        table.innerHTML = "";
        let no = 1;

        snapshot.forEach(child => {
            const t = child.val();
            const key = child.key;

            const row = table.insertRow();

            row.innerHTML = `
                <td>${no++}</td>
                <td>${t.nama}</td>
                <td>${t.departemen}</td>
                <td>${t.deskripsi}</td>
                <td>${t.penyelesaian || '-'}</td>
                <td class="${t.status==='OPEN'?'status-open':'status-done'}">
                    ${t.status}
                </td>
                <td>
                    ${isAdmin ? `
                        <button onclick="markDone('${key}')">✔</button>
                        <button onclick="deleteTicket('${key}')">🗑</button>
                    ` : '-'}
                </td>
            `;
        });
    });
}

// CREATE
function createTicket(e){
    e.preventDefault();

    const data = {
        nama: document.getElementById("nama").value,
        departemen: document.getElementById("departemen").value,
        deskripsi: document.getElementById("deskripsi").value,
        penyelesaian: document.getElementById("penyelesaian").value,
        status: document.getElementById("penyelesaian").value ? "DONE" : "OPEN",
        createdAt: Date.now()
    };

    db.ref("tickets").push(data);
    e.target.reset();
}

// UPDATE STATUS
function markDone(key){
    const solusi = prompt("Isi penyelesaian:");
    if(!solusi) return;

    db.ref("tickets/" + key).update({
        penyelesaian: solusi,
        status: "DONE"
    });
}

// DELETE
function deleteTicket(key){
    if(confirm("Hapus tiket?")){
        db.ref("tickets/" + key).remove();
    }
}

// ADMIN LOGIN
function adminLogin(){
    const pass = prompt("Password:");
    if(pass==="admin123"){
        alert("Login sukses");
        isAdmin = true;
        loadTickets(); // reload biar tombol muncul
    }else{
        alert("Salah");
    }
}

// CLOCK
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML = now.toLocaleString('id-ID');
}
setInterval(updateClock,1000);

// DARK MODE AUTO
(function(){
    const h=new Date().getHours();
    if(h>=18||h<6) document.body.classList.add("dark-mode");
})();

// INIT
window.onload = loadTickets;

</script>


</body>
</html>
