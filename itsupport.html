<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Support Ticket</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{
    font-family: 'Segoe UI';
    margin:0;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    background:#2a5298;
    color:white;
    cursor:pointer;
}

input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

.status-open{color:red;}
.status-done{color:green;}
</style>

</head>

<body>

<div class="container">

<div style="text-align:right;">
<button onclick="adminLogin()">Login Admin</button>
<button onclick="loginGithub()">Login GitHub</button>
</div>

<h2>IT Support Ticket</h2>

<form onsubmit="createTicket(event)">
<input id="nama" placeholder="Nama Pelapor" required>
<select id="departemen" required>
<option value="">Pilih Dept</option>
<option>IT</option>
<option>Medsos</option>
<option>Redaksi</option>
</select>
<textarea id="deskripsi" placeholder="Masalah" required></textarea>
<textarea id="penyelesaian" placeholder="Solusi"></textarea>

<button type="submit">Buat Tiket</button>
</form>

<h3>Daftar Tiket</h3>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Dept</th>
<th>Deskripsi</th>
<th>Solusi</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>

</div>

<script>

// CONFIG (GANTI API KEY LU)
const firebaseConfig = {
  apiKey: "ISI_API_KEY_LO",
  authDomain: "it-supportticket.firebaseapp.com",
  databaseURL: "https://it-supportticket-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "it-supportticket"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin = false;

// LOAD DATA
function loadTickets(){
    console.log("LOAD TICKETS JALAN"); //
    const table = document.getElementById("ticketTable");

    db.ref("tickets").on("value", snap=>{
        console.log("DATA MASUK:", snap.val()); //
        table.innerHTML="";
        let no=1;

        snap.forEach(child=>{
            const t = child.val();
            const key = child.key;

            const row = table.insertRow();

            row.innerHTML = `
            <td>${no++}</td>
            <td>${t.nama}</td>
            <td>${t.departemen}</td>
            <td>${t.deskripsi}</td>
            <td>${t.penyelesaian || '-'}</td>
            <td class="${t.status==='OPEN'?'status-open':'status-done'}">${t.status}</td>
            <td>
            ${isAdmin ? `
            <button onclick="done('${key}')">✔</button>
            <button onclick="hapus('${key}')">🗑</button>
            ` : '-'}
            </td>
            `;
        });
    });
}

// CREATE
function createTicket(e){
    e.preventDefault();

    const data = {
        nama: document.getElementById("nama").value,
        departemen: document.getElementById("departemen").value,
        deskripsi: document.getElementById("deskripsi").value,
        penyelesaian: document.getElementById("penyelesaian").value,
        status: document.getElementById("penyelesaian").value ? "DONE" : "OPEN"
    };

    db.ref("tickets").push(data)
    .then(()=>{
        alert("✅ Data masuk Firebase");
    })
    .catch(err=>{
        console.error(err);
        alert("❌ Gagal simpan");
    });
}

// UPDATE
function done(key){
    const solusi = prompt("Isi solusi:");
    if(!solusi) return;

    db.ref("tickets/"+key).update({
        penyelesaian: solusi,
        status: "DONE"
    });
}

// DELETE
function hapus(key){
    if(confirm("Hapus tiket?")){
        db.ref("tickets/"+key).remove();
    }
}

// ADMIN LOGIN
function adminLogin(){
    const pass = prompt("Password:");
    if(pass==="admin123"){
        isAdmin=true;
        alert("Admin login");
        loadTickets();
    }else{
        alert("Salah");
    }
}

// LOGIN GITHUB
function loginGithub(){
    const provider = new firebase.auth.GithubAuthProvider();

    firebase.auth().signInWithPopup(provider)
    .then(res=>{
        alert("Login GitHub sukses: "+res.user.displayName);
    })
    .catch(err=>{
        console.error(err);
        alert("Login gagal");
    });
}

// INIT
window.onload = function(){
    console.log("Web siap");
    loadTickets();
};

db.ref("tickets").on("value", snap=>{
    console.log("DATA:", snap.val()); // 
});
    
console.log("JS jalan");
</script>

</body>
</html>
