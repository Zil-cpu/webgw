<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Streaming</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.video-container{
    position:relative;
    width:100%;
    max-width:1200px;
    aspect-ratio:16/9;
}

.video-container iframe{
    position:absolute;
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="video-container">
<iframe 
src="https://www.youtube.com/embed/F6I94BHiHVc?autoplay=1&mute=1" 
allow="autoplay; encrypted-media" 
allowfullscreen>
</iframe>
</div>

</body>
</html>
