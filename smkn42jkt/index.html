<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <h1 class="judul">LIVE STREAMING</h1>


  <style>
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .judul {
  font-size: 36px;
  font-weight: bold;
  text-transform: uppercase;
  margin: 25px 0;
  color: #fff;
  background: linear-gradient(90deg, red, orange);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
      
   }



    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h2 {
      margin: 20px 0;
    }

    /* Responsive Video */
    .video-wrapper {
      position: relative;
      width: 95%;
      max-width: 1000px;
      margin: 20px auto;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    /* Optional: agar ada jarak bawah */
    .footer {
      margin: 30px 0;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  
  <div class="video-wrapper">
    <iframe 
      src="https://www.youtube.com/embed/F6I94BHiHVc"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div class="footer">
    © 2026 SMKN 42 Jakarta
  </div>

</body>

</html>
