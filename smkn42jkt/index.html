<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Streaming</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    .judul {
      font-size: 36px;
      font-weight: bold;
      text-transform: uppercase;
      margin: 25px 0;
      color: #fff;
      background: linear-gradient(90deg, red, orange);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .live-indicator {
  font-size: 20px;
  font-weight: bold;
  margin-top: -10px;
  margin-bottom: 20px;
  color: red;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}


    /* Responsive Video */
    .video-wrapper {
      position: relative;
      width: 95%;
      max-width: 1000px;
      margin: 20px auto;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }

    .tv-frame {
  background: #000;
  padding: 20px;
  border-radius: 20px;
  width: 95%;
  max-width: 1050px;
  margin: 20px auto;
  box-shadow: 
    0 0 40px rgba(0,0,0,0.8),
    inset 0 0 25px rgba(255,255,255,0.05);
  border: 8px solid #333;
}

.tv-frame::before {
  content: "";
  display: block;
  width: 80px;
  height: 8px;
  background: #222;
  margin: 0 auto 15px auto;
  border-radius: 5px;
}

.tv-frame::after {
  content: "";
  display: block;
  width: 120px;
  height: 10px;
  background: #222;
  margin: 15px auto 0 auto;
  border-radius: 5px;
}

    .footer {
      margin: 30px 0;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- 🔥 PINDAHKAN KE SINI -->
  <h1 class="judul">LIVE STREAMING</h1>
  <div class="live-indicator">
  🔴 LIVE ● ON AIR
</div>


  <div class="tv-frame">
  <div class="video-wrapper">
    <iframe 
      src="https://www.youtube.com/embed/F6I94BHiHVc"
      frameborder="0"
      allowfullscreen>
    </iframe>
      </div>
</div>

  <div class="footer">
    
  </div>

</body>
</html>
